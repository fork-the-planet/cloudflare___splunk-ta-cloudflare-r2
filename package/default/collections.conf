#
# Processed-key checkpoint collection for the Cloudflare R2 input.
# See the internal UCC_EXECUTION_PLAN.md 4.6.1.
#
# Schema (one row per ingested object, per input):
#   _key   = "{input}|{object_key}"   (raw key; length ceiling verified >= 65536 B
#                                       on Splunk 9.4, ~368x margin vs worst case)
#   input  = normalized input name    (per-input dedupe/prune scoping)
#   ts     = epoch seconds the object was fully emitted (NUMBER, for ts-based prune)
#
# Dedupe query : {$and:[{input},{_key:{$gte: "{input}|{floor}"}}]}  (served by _key + input)
# Prune query  : {$and:[{input},{ts:{$lt: cutoff}}]}                 (served by accelerated input_ts)
#
# enforceTypes + field.ts=number is load-bearing: the input asserts
# content["field.ts"]=="number" at startup (S10) and refuses to run against an
# untyped collection, so ts-based pruning can never silently no-op.
[TA_cloudflare_r2_processed_keys]
enforceTypes = true
field.ts = number
field.input = string
accelerated_fields.input_ts = {"input": 1, "ts": 1}
